<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesoría Individual - Desemvolvatec</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="icon" href="img/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .chat-wrapper { padding: 20px 30px; flex: 1; display: flex; flex-direction: column; }
        @media (max-width: 768px) { .chat-wrapper { padding: 15px; } }
        .chat-container { background: white; border-radius: 12px; border: 1px solid #eaeaea; display: flex; flex-direction: column; flex: 1; max-height: calc(100vh - 120px); overflow: hidden; }
        .chat-header { padding: 15px 20px; background: #fdfbf9; border-bottom: 1px solid #eaeaea; display: flex; align-items: center; gap: 15px; }
        .chat-avatar { width: 45px; height: 45px; background: var(--color-primario); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #ffffff; display: flex; flex-direction: column; gap: 15px; }
        .mensaje { max-width: 80%; padding: 12px 18px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .mensaje-bot { background: #f4f6f8; border: 1px solid #eaeaea; color: var(--color-texto-principal); align-self: flex-start; border-bottom-left-radius: 2px; }
        .mensaje-usuario { background: var(--color-primario); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-input-area { padding: 10px 15px; background: #fdfbf9; border-top: 1px solid #eaeaea; display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 12px 20px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-family: var(--fuente-texto); transition: border-color 0.3s; }
        .chat-input-area input:focus { border-color: var(--color-primario); }
        .chat-input-area button { background: var(--color-primario); color: white; border: none; width: 46px; height: 46px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .escribiendo { font-size: 0.85rem; color: #888; font-style: italic; display: none; margin-bottom: 5px; align-self: flex-start; margin-left: 20px; }
    </style>
</head>
<body class="dashboard-body">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo"><span>Desemvolvatec</span></div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><span class="material-icons">dashboard</span> Inicio</a>
            <a href="#" class="nav-item activo"><span class="material-icons">support_agent</span> Asesoría</a>
            <a href="rutina.html" class="nav-item"><span class="material-icons">calendar_month</span> Mi Rutina</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div class="header-izq">
                <span class="material-icons menu-toggle" onclick="toggleSidebar()">menu</span>
                <a href="dashboard.html" style="text-decoration: none; color: var(--color-texto-gris); display: flex; align-items: center; gap: 8px; font-weight: 500; white-space: nowrap;">
                    <span class="material-icons">arrow_back</span> <span class="user-name">Volver al Panel</span>
                </a>
            </div>
            <div class="header-der">
                <div class="user-avatar" id="nav-avatar">U</div>
            </div>
        </header>

        <div class="chat-wrapper">
            <div class="chat-container">
                <div class="chat-header">
                    <div class="chat-avatar"><span class="material-icons">face_4</span></div>
                    <div>
                        <h3 style="margin: 0; color: var(--color-primario); font-size: 1.1rem;">Diana Urban</h3>
                        <span style="font-size: 0.8rem; color: #2ecc71;">● En línea</span>
                    </div>
                </div>
                <div class="chat-messages" id="chat-caja"></div>
                <div class="escribiendo" id="indicador-escribiendo">Diana está escribiendo...</div>
                <div class="chat-input-area">
                    <input type="text" id="input-mensaje" placeholder="Escribe aquí..." onkeypress="if(event.key === 'Enter') enviarMensaje()">
                    <button onclick="enviarMensaje()"><span class="material-icons">send</span></button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArxvBjK5d9PzmOEbuuRyVVu9MuhtKmd_Q",
            authDomain: "desemvolvatec.firebaseapp.com",
            projectId: "desemvolvatec",
            storageBucket: "desemvolvatec.firebasestorage.app",
            messagingSenderId: "559151091877",
            appId: "1:559151091877:web:ce2c950ab284c8cc5a3d4c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let nombreEstudiante = "";
        const cajaChat = document.getElementById('chat-caja');
        const inputMensaje = document.getElementById('input-mensaje');
        const indicadorEscribiendo = document.getElementById('indicador-escribiendo');
        const esperar = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        onAuthStateChanged(auth, (user) => {
            if (user) {
                nombreEstudiante = user.displayName || user.email.split('@')[0];
                document.getElementById('nav-avatar').innerText = nombreEstudiante.charAt(0).toUpperCase();
                iniciarChat();
            } else {
                window.location.href = "login.html";
            }
        });

        async function iniciarChat() {
            await esperar(500);
            indicadorEscribiendo.style.display = "block";
            await esperar(1500);
            indicadorEscribiendo.style.display = "none";
            agregarMensaje('bot', `¡Hola, ${nombreEstudiante}! 👋 Soy Diana Urban, tu orientadora virtual en Desemvolvatec.`);
            
            await esperar(800);
            indicadorEscribiendo.style.display = "block";
            await esperar(2000);
            indicadorEscribiendo.style.display = "none";
            agregarMensaje('bot', `Este es un espacio seguro y totalmente confidencial para apoyarte en tu desarrollo académico y emocional.`);
            
            await esperar(1000);
            indicadorEscribiendo.style.display = "block";
            await esperar(1200);
            indicadorEscribiendo.style.display = "none";
            agregarMensaje('bot', `¿En qué te puedo ayudar el día de hoy?`);
        }

        window.enviarMensaje = function() {
            const texto = inputMensaje.value.trim();
            if (texto === "") return;
            agregarMensaje('usuario', texto);
            inputMensaje.value = "";
            indicadorEscribiendo.style.display = "block";
            cajaChat.scrollTop = cajaChat.scrollHeight;
            setTimeout(() => {
                indicadorEscribiendo.style.display = "none";
                responderComoDiana(texto);
            }, 1500 + Math.random() * 1000);
        };

        function agregarMensaje(emisor, texto) {
            const div = document.createElement('div');
            div.classList.add('mensaje', emisor === 'bot' ? 'mensaje-bot' : 'mensaje-usuario');
            div.innerText = texto;
            cajaChat.appendChild(div);
            cajaChat.scrollTop = cajaChat.scrollHeight;
        }

        function responderComoDiana(mensajeUsuario) {
            const texto = mensajeUsuario.toLowerCase();
            let respuesta = "Entiendo. Cuéntame un poco más sobre eso, estoy aquí para apoyarte.";
            if (texto.includes("estres") || texto.includes("cansado")) respuesta = `Es normal sentirse así, ${nombreEstudiante}. ¿Has intentado hacer pausas activas?`;
            else if (texto.includes("examen") || texto.includes("proyecto")) respuesta = "Las evaluaciones generan ansiedad. Enfócate en tu preparación. ¿Cómo organizas tu tiempo?";
            agregarMensaje('bot', respuesta);
        }

        window.toggleSidebar = function() {
            const sidebar = document.getElementById('sidebar');
            let overlay = document.getElementById('sidebar-overlay');
            if (!overlay) {
                overlay = document.createElement('div');
                overlay.id = 'sidebar-overlay';
                overlay.className = 'sidebar-overlay';
                document.body.appendChild(overlay);
                overlay.onclick = window.toggleSidebar; 
            }
            if (window.innerWidth > 768) { sidebar.classList.toggle('colapsado'); } 
            else { sidebar.classList.toggle('active'); overlay.classList.toggle('active'); }
        };
    </script>
</body>
</html>
