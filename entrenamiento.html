<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrenamiento Táctico - Desemvolvatec</title>
    <link rel="icon" href="img/favicon.png" type="image/png">
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Datos de las Misiones ---
        const MISSIONS = {
            math: [
                { id: 1, question: "Si tienes 5 cajas de munición y cada una trae 12 balas, ¿cuántas tienes en total?", options: ["50", "60", "48", "72"], correct: 1, xp: 100 },
                { id: 2, question: "Tu escudo está al 25%. Si regeneras un 40% más, ¿cuánto tienes?", options: ["55%", "60%", "65%", "75%"], correct: 2, xp: 120 },
                { id: 3, question: "Resuelve: (8 x 4) - 10", options: ["22", "32", "18", "24"], correct: 0, xp: 150 },
            ],
            spanish: [
                { id: 1, question: "¿Cuál es el sujeto en: 'El soldado reparó su armadura'?", options: ["El soldado", "Reparó", "Su armadura", "Soldado"], correct: 0, xp: 100 },
                { id: 2, question: "Sinónimo de 'Batalla'", options: ["Paz", "Contienda", "Acuerdo", "Huida"], correct: 1, xp: 120 },
                { id: 3, question: "Elige la palabra escrita correctamente:", options: ["Habilidad", "Abilidad", "Havilida", "Avilidad"], correct: 0, xp: 150 },
            ]
        };

        const PSYCH_TIPS = [
            "Soldado, el descanso es tan importante como el entrenamiento. Duerme 8 horas.",
            "La ansiedad es como un enemigo invisible. Respira profundo (4 seg), mantén (4 seg) y suelta (4 seg).",
            "No estás solo en esta misión. Pedir refuerzos (ayuda) es de valientes.",
            "Organiza tus tareas escolares como si fuera un plan de batalla: prioriza lo urgente.",
        ];

        // --- Sub-componentes Visuales ---
        const Logo = () => (
            <div className="flex flex-col items-center justify-center mb-6 animate-pulse">
                <h1 className="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-green-400 to-blue-500 uppercase filter drop-shadow-lg">
                    Desemvolva-Tec
                </h1>
                <div className="w-full h-1 bg-gradient-to-r from-transparent via-orange-500 to-transparent mt-1"></div>
            </div>
        );

        const ProgressBar = ({ current, max, color = "bg-green-500" }) => (
            <div className="w-full bg-slate-800 h-3 rounded-full overflow-hidden border border-slate-700">
                <div className={`h-full ${color} transition-all duration-500 ease-out shadow-[0_0_10px_currentColor]`}
                     style={{ width: `${Math.min((current / max) * 100, 100)}%` }}></div>
            </div>
        );

        // --- Aplicación Principal ---
        function DesemvolvaTecApp() {
            // Estados de la aplicación
            const [view, setView] = useState('landing'); 
            const [user, setUser] = useState({
                name: '', level: 1, xp: 0, xpToNext: 500, avatar: { type: 'spartan', color: 'blue' } 
            });
            const [activeMission, setActiveMission] = useState(null);
            const [missionProgress, setMissionProgress] = useState(0);
            const [feedback, setFeedback] = useState(null); 
            const [currentTip, setCurrentTip] = useState(0);

            // Lógica del juego
            const levelUp = () => {
                setUser(prev => ({
                    ...prev, level: prev.level + 1, xp: prev.xp - prev.xpToNext, xpToNext: Math.floor(prev.xpToNext * 1.5)
                }));
            };

            const addXp = (amount) => {
                let newXp = user.xp + amount;
                if (newXp >= user.xpToNext) levelUp();
                else setUser(prev => ({ ...prev, xp: newXp }));
            };

            const handleMissionComplete = (score) => {
                addXp(score);
                setView('dashboard');
                setActiveMission(null);
                setMissionProgress(0);
            };

            const handleAnswer = (index, currentQ, questions) => {
                if (index === currentQ.correct) {
                    setFeedback('correct');
                    setTimeout(() => {
                        setFeedback(null);
                        if (missionProgress < questions.length - 1) setMissionProgress(prev => prev + 1);
                        else handleMissionComplete(currentQ.xp + 50);
                    }, 1500);
                } else {
                    setFeedback('wrong');
                    setTimeout(() => setFeedback(null), 1000);
                }
            };

            // --- Vistas Renderizadas ---
            const renderLandingView = () => (
                <div className="flex flex-col items-center justify-center min-h-screen p-8 text-center bg-slate-950 bg-cover bg-center bg-no-repeat relative">
                    <button onClick={() => window.location.href = 'dashboard.html'} className="absolute top-6 left-6 flex items-center gap-2 text-slate-400 hover:text-white transition-colors z-20">
                        <span className="material-icons">arrow_back</span> Volver al Panel
                    </button>
                    <div className="absolute inset-0 bg-slate-900/90 backdrop-blur-sm"></div>
                    <div className="relative z-10 max-w-2xl w-full">
                        <Logo />
                        <p className="text-blue-200 text-lg mb-8 font-mono tracking-wide">
                            SISTEMA DE ENTRENAMIENTO ACADÉMICO Y PSICOLÓGICO ACTIVADO.
                        </p>
                        <div className="bg-slate-800/80 border border-blue-500/30 p-8 rounded-lg shadow-2xl backdrop-blur-md transform transition-all hover:scale-105 duration-300">
                            <h2 className="text-2xl text-white font-bold mb-4 uppercase">Identificación de Recluta</h2>
                            
                            {/* CAJA DE TEXTO ARREGLADA (value vinculado al estado) */}
                            <input type="text" placeholder="Ingresa tu Gamertag"
                                value={user.name}
                                onChange={(e) => setUser({...user, name: e.target.value})}
                                className="w-full bg-slate-900 border border-slate-600 text-white px-4 py-3 rounded mb-6 focus:outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 font-mono" />
                            
                            <button disabled={!user.name.trim()} onClick={() => setView('avatar')}
                                className="w-full bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-500 hover:to-blue-700 text-white font-bold py-4 rounded uppercase tracking-widest shadow-[0_0_20px_rgba(37,99,235,0.5)] transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                                <span className="material-icons">gps_fixed</span> Iniciar Protocolo
                            </button>
                        </div>
                    </div>
                </div>
            );

            const renderAvatarCreator = () => {
                const armorTypes = [
                    { id: 'spartan', name: 'Mark-VII (Spartan)', desc: 'Agilidad y Escudos. Estilo futurista.', icon: <span className="material-icons text-cyan-400">bolt</span> },
                    { id: 'gear', name: 'Delta Squad (Gear)', desc: 'Blindaje pesado y fuerza bruta.', icon: <span className="material-icons text-orange-600">security</span> }
                ];
                const colors = ['blue', 'green', 'red', 'yellow', 'slate'];

                return (
                    <div className="min-h-screen bg-slate-900 text-white p-6 flex flex-col items-center">
                        <h2 className="text-3xl font-bold uppercase tracking-widest text-blue-400 mb-8 mt-10">Personalizar Operador</h2>
                        <div className="flex flex-col md:flex-row gap-10 w-full max-w-4xl items-center justify-center">
                            <div className={`w-64 h-80 border-4 border-${user.avatar.color}-500 bg-slate-800 rounded-2xl flex items-center justify-center relative shadow-[0_0_30px_rgba(0,0,0,0.5)] overflow-hidden transition-all duration-500`}>
                                <div className={`transition-all duration-500 transform ${user.avatar.type === 'gear' ? 'scale-110' : 'scale-100'}`}>
                                    <svg width="150" height="200" viewBox="0 0 100 150">
                                       <rect x="35" y="10" width="30" height="30" rx={user.avatar.type === 'spartan' ? 8 : 2} fill={user.avatar.color === 'slate' ? '#94a3b8' : user.avatar.color} className="opacity-90"/>
                                       <rect x="38" y="20" width="24" height={user.avatar.type === 'spartan' ? 8 : 4} fill="#fbbf24" className="animate-pulse" />
                                       <path d={user.avatar.type === 'spartan' ? "M25 45 L75 45 L80 100 L20 100 Z" : "M15 45 L85 45 L90 110 L10 110 Z"} fill="#334155" stroke={user.avatar.color} strokeWidth="3" />
                                       <circle cx="50" cy="70" r="8" fill={user.avatar.type === 'spartan' ? '#0ea5e9' : '#f97316'} className="animate-pulse" />
                                    </svg>
                                </div>
                                <div className="absolute bottom-4 left-0 right-0 text-center font-mono text-sm opacity-70">
                                    CLASE: {user.avatar.type === 'spartan' ? 'EXPLORADOR' : 'ARTILLERO'}
                                </div>
                            </div>

                            <div className="space-y-6 w-full max-w-md">
                                <div>
                                    <label className="text-sm text-slate-400 uppercase tracking-wide mb-2 block">Modelo de Armadura</label>
                                    <div className="grid grid-cols-2 gap-4">
                                        {armorTypes.map((armor) => (
                                            <button key={armor.id} onClick={() => setUser({...user, avatar: {...user.avatar, type: armor.id}})}
                                                className={`p-4 rounded border ${user.avatar.type === armor.id ? 'bg-blue-900/40 border-blue-400' : 'bg-slate-800 border-slate-700 hover:border-slate-500'} text-left transition-all`}>
                                                <div className="mb-2">{armor.icon}</div>
                                                <div className="font-bold">{armor.name}</div>
                                                <div className="text-xs text-slate-400 mt-1">{armor.desc}</div>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <label className="text-sm text-slate-400 uppercase tracking-wide mb-2 block">Pintura de Combate</label>
                                    <div className="flex gap-3">
                                        {colors.map((c) => (
                                            <button key={c} onClick={() => setUser({...user, avatar: {...user.avatar, color: c}})}
                                                className={`w-12 h-12 rounded-full border-2 ${user.avatar.color === c ? 'border-white scale-110 shadow-lg' : 'border-transparent opacity-60'} transition-all`}
                                                style={{ backgroundColor: c === 'slate' ? '#475569' : c }} />
                                        ))}
                                    </div>
                                </div>

                                <button onClick={() => setView('dashboard')} className="w-full mt-8 bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded uppercase tracking-widest shadow-[0_0_15px_rgba(22,163,74,0.6)] animate-bounce-subtle">
                                    Confirmar Equipamiento
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderDashboard = () => (
                <div className="min-h-screen bg-slate-950 text-white font-sans selection:bg-blue-500 selection:text-white">
                    <header className="fixed top-0 w-full bg-slate-900/90 border-b border-blue-900/50 backdrop-blur-md z-50 px-4 py-3 flex justify-between items-center shadow-lg">
                        <div className="flex items-center gap-3">
                            <button onClick={() => window.location.href = 'dashboard.html'} title="Salir del simulador" className="mr-2 text-slate-400 hover:text-white">
                                <span className="material-icons">exit_to_app</span>
                            </button>
                            <div className={`w-10 h-10 rounded bg-slate-800 border border-${user.avatar.color}-500 flex items-center justify-center`}>
                                <span className={`material-icons text-${user.avatar.color}-400`}>person</span>
                            </div>
                            <div>
                                <h3 className="font-bold uppercase text-sm leading-none">{user.name}</h3>
                                <span className="text-xs text-blue-400 font-mono">Rango: {user.level}</span>
                            </div>
                        </div>

                        <div className="flex-1 max-w-md mx-4 hidden md:block">
                            <div className="flex justify-between text-xs text-slate-400 mb-1 font-mono uppercase">
                                <span>Progreso de Nivel</span>
                                <span>{user.xp} / {user.xpToNext} XP</span>
                            </div>
                            <ProgressBar current={user.xp} max={user.xpToNext} color="bg-yellow-500" />
                        </div>

                        <div className="text-right hidden sm:block">
                             <span className="text-green-400 font-mono text-xl font-bold tracking-widest">DESEMVOLVA-TEC</span>
                        </div>
                    </header>

                    <main className="pt-24 pb-20 px-4 max-w-6xl mx-auto">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="md:col-span-2 space-y-6">
                                <h2 className="text-2xl font-bold uppercase tracking-widest flex items-center gap-2 border-l-4 border-blue-500 pl-4">
                                    <span className="material-icons text-blue-500">my_location</span> Mapa de Operaciones
                                </h2>
                                
                                <div className="bg-slate-900 rounded-xl border border-slate-700 p-6 relative overflow-hidden min-h-[400px]">
                                    <div className="absolute inset-0 bg-[linear-gradient(to_right,#1e293b_1px,transparent_1px),linear-gradient(to_bottom,#1e293b_1px,transparent_1px)] bg-[size:40px_40px] opacity-20"></div>

                                    <div className="relative z-10 space-y-8">
                                        <div className="relative">
                                            <div className="absolute -left-2 top-8 w-1 h-full bg-slate-700"></div>
                                            <button onClick={() => { setActiveMission('math'); setView('mission'); }}
                                                className="w-full bg-slate-800/80 hover:bg-slate-700 border-l-4 border-blue-500 p-4 rounded flex items-center justify-between group transition-all">
                                                <div className="flex items-center gap-4">
                                                    <div className="p-3 bg-blue-900/30 rounded text-blue-400 group-hover:text-white transition-colors">
                                                        <span className="material-icons">calculate</span>
                                                    </div>
                                                    <div className="text-left">
                                                        <h4 className="font-bold text-lg group-hover:text-blue-300">Entrenamiento Lógico (Mate)</h4>
                                                        <p className="text-xs text-slate-400">Calcula coordenadas y suministros.</p>
                                                    </div>
                                                </div>
                                                <span className="material-icons text-slate-500 group-hover:text-blue-400 group-hover:translate-x-1 transition-all">chevron_right</span>
                                            </button>
                                        </div>

                                        <div className="relative">
                                             <div className="absolute -left-2 top-8 w-1 h-full bg-slate-700"></div>
                                            <button onClick={() => { setActiveMission('spanish'); setView('mission'); }}
                                                className="w-full bg-slate-800/80 hover:bg-slate-700 border-l-4 border-orange-500 p-4 rounded flex items-center justify-between group transition-all">
                                                <div className="flex items-center gap-4">
                                                    <div className="p-3 bg-orange-900/30 rounded text-orange-400 group-hover:text-white transition-colors">
                                                        <span className="material-icons">menu_book</span>
                                                    </div>
                                                    <div className="text-left">
                                                        <h4 className="font-bold text-lg group-hover:text-orange-300">Decodificación Verbal (Español)</h4>
                                                        <p className="text-xs text-slate-400">Mejora la comunicación del pelotón.</p>
                                                    </div>
                                                </div>
                                                <span className="material-icons text-slate-500 group-hover:text-orange-400 group-hover:translate-x-1 transition-all">chevron_right</span>
                                            </button>
                                        </div>

                                         <div className="opacity-50 pointer-events-none mt-4">
                                            <div className="w-full border-2 border-dashed border-slate-700 p-4 rounded flex items-center gap-4">
                                                <span className="material-icons text-slate-600">lock</span>
                                                <span className="font-mono uppercase text-slate-500">Nivel 2 - Bloqueado (Requiere Nvl 5)</span>
                                            </div>
                                         </div>
                                    </div>
                                </div>
                            </div>

                            <div className="space-y-6">
                                <div className="bg-gradient-to-b from-slate-800 to-slate-900 rounded-xl p-1 border border-green-500/30 shadow-[0_0_20px_rgba(34,197,94,0.1)]">
                                    <div className="bg-slate-900 rounded-lg p-5">
                                        <div className="flex items-center gap-2 mb-4 text-green-400">
                                            <span className="material-icons animate-pulse">psychology</span>
                                            <h3 className="font-bold uppercase tracking-wider">Soporte Vital</h3>
                                        </div>
                                        <p className="text-sm text-slate-300 mb-4">Asesoría psicológica y estado mental del operador.</p>
                                        <button onClick={() => setView('psych')} className="w-full bg-green-900/30 hover:bg-green-900/50 text-green-300 border border-green-700 py-2 rounded text-sm uppercase tracking-wide transition-all flex items-center justify-center gap-2">
                                            <span className="material-icons text-sm">chat</span> Contactar Base
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-slate-800 rounded-xl p-6 border border-slate-700">
                                    <h3 className="font-bold text-slate-200 mb-4 uppercase text-xs tracking-widest border-b border-slate-700 pb-2">Estadísticas de Combate</h3>
                                    <ul className="space-y-3 font-mono text-sm">
                                        <li className="flex justify-between"><span className="text-slate-400">Misiones:</span><span className="text-white">0</span></li>
                                        <li className="flex justify-between"><span className="text-slate-400">Precisión:</span><span className="text-white">100%</span></li>
                                        <li className="flex justify-between"><span className="text-slate-400">Racha:</span><span className="text-yellow-500 flex items-center gap-1"><span className="material-icons text-xs">bolt</span> 0</span></li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );

            const renderMissionView = () => {
                const questions = MISSIONS[activeMission];
                const currentQ = questions[missionProgress];

                return (
                    <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-4 relative overflow-hidden">
                        <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-900/20 via-slate-950 to-slate-950"></div>
                        <div className="relative z-10 w-full max-w-2xl">
                            <div className="flex justify-between items-center mb-6 text-blue-400 font-mono text-sm uppercase">
                                <span>Misión: {activeMission === 'math' ? 'Cálculo Táctico' : 'Lingüística'}</span>
                                <span>Objetivo {missionProgress + 1}/{questions.length}</span>
                            </div>

                            <ProgressBar current={missionProgress} max={questions.length} color="bg-blue-500" />

                            <div className="mt-8 bg-slate-900/90 border-2 border-slate-600 rounded-lg p-8 shadow-2xl backdrop-blur relative">
                                <div className="absolute -top-1 -left-1 w-4 h-4 border-t-2 border-l-2 border-blue-400"></div>
                                <div className="absolute -top-1 -right-1 w-4 h-4 border-t-2 border-r-2 border-blue-400"></div>
                                <div className="absolute -bottom-1 -left-1 w-4 h-4 border-b-2 border-l-2 border-blue-400"></div>
                                <div className="absolute -bottom-1 -right-1 w-4 h-4 border-b-2 border-r-2 border-blue-400"></div>

                                <h2 className="text-2xl text-white font-bold mb-8 text-center">{currentQ.question}</h2>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {currentQ.options.map((opt, idx) => (
                                        <button key={idx} onClick={() => handleAnswer(idx, currentQ, questions)}
                                            className={`p-4 rounded border-2 transition-all font-bold text-lg uppercase tracking-wider
                                            ${feedback === 'correct' && idx === currentQ.correct ? 'bg-green-600 border-green-400 text-white shadow-[0_0_20px_rgba(34,197,94,0.5)]' : feedback === 'wrong' ? 'bg-slate-800 border-slate-700 text-slate-400 opacity-50' : 'bg-slate-800 border-slate-600 text-blue-100 hover:bg-slate-700 hover:border-blue-400'}`}>
                                            {opt}
                                        </button>
                                    ))}
                                </div>

                                {feedback === 'wrong' && (
                                    <div className="absolute inset-0 bg-red-900/80 flex items-center justify-center rounded-lg backdrop-blur-sm animate-pulse z-20">
                                        <h3 className="text-4xl font-black text-white uppercase transform rotate-12 border-4 border-white p-4">¡Fallo en sistema!</h3>
                                    </div>
                                )}
                                {feedback === 'correct' && (
                                    <div className="absolute inset-0 bg-green-900/80 flex items-center justify-center rounded-lg backdrop-blur-sm z-20">
                                        <div className="text-center">
                                            <h3 className="text-4xl font-black text-white uppercase mb-2">¡Objetivo Asegurado!</h3>
                                            <p className="text-green-300 font-mono">XP +{currentQ.xp}</p>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <button onClick={() => setView('dashboard')} className="mt-8 text-slate-500 hover:text-white flex items-center gap-2 mx-auto uppercase text-sm tracking-widest transition-colors">
                                Abortar Misión
                            </button>
                        </div>
                    </div>
                );
            };

            const renderPsychView = () => (
                <div className="min-h-screen bg-slate-900 flex flex-col">
                    <header className="p-4 bg-green-900/20 border-b border-green-800 flex items-center gap-4">
                        <button onClick={() => setView('dashboard')} className="text-green-400 hover:text-white font-bold"> {'<'} VOLVER</button>
                        <h1 className="text-green-400 uppercase tracking-widest font-bold ml-auto">Enlace Psicológico Seguro</h1>
                    </header>

                    <main className="flex-1 p-8 flex flex-col items-center justify-center relative">
                        <div className="w-full max-w-2xl bg-black border border-green-500/50 p-8 rounded-lg shadow-[0_0_50px_rgba(34,197,94,0.1)] relative">
                            <div className="flex items-start gap-6">
                                <div className="w-20 h-20 bg-green-900 rounded-full flex items-center justify-center border-2 border-green-400 shrink-0">
                                    <span className="material-icons text-green-300" style={{fontSize: '40px'}}>psychology</span>
                                </div>
                                <div className="flex-1">
                                    <h2 className="text-green-400 font-mono text-sm mb-2 uppercase">Transmisión Entrante...</h2>
                                    <div className="h-32 flex items-center">
                                        <p className="text-xl text-white font-light leading-relaxed">
                                            "{PSYCH_TIPS[currentTip]}"
                                        </p>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-8 flex justify-end gap-4 border-t border-green-900/50 pt-4">
                                <button onClick={() => setCurrentTip((prev) => (prev + 1) % PSYCH_TIPS.length)} className="bg-green-700 hover:bg-green-600 text-white px-6 py-2 rounded uppercase text-sm tracking-wide transition-colors">
                                    Siguiente Consejo
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );

            // Decidimos qué vista mostrar usando los renders que preparamos arriba
            return (
                <div className="font-sans antialiased text-slate-200">
                    {view === 'landing' && renderLandingView()}
                    {view === 'avatar' && renderAvatarCreator()}
                    {view === 'dashboard' && renderDashboard()}
                    {view === 'mission' && renderMissionView()}
                    {view === 'psych' && renderPsychView()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DesemvolvaTecApp />);
    </script>
</body>
</html>
