<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Desemvolvatec</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="img/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

    <header>
        <div class="logo-container">
            <span>Desemvolvatec</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="sobre-nosotros.html">Sobre nosotros</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="testimonios.html">Testimonios</a></li>
                <li><a href="equipo.html">Equipo</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <div class="login-container">
        <div class="login-card">
            
            <div id="form-login">
                <span class="login-logo">Bienvenido de nuevo</span>
                <p>Ingresa a tu espacio seguro</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="login-email">Correo electrónico</label>
                        <input type="email" id="login-email" required placeholder="tu@correo.com">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Contraseña</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-submit">Iniciar sesión</button>
                </form>

                <div class="toggle-form">
                    ¿No tienes una cuenta? <a onclick="window.toggleForms()" style="cursor: pointer; color: var(--color-primario); font-weight: 600;">Regístrate aquí</a>
                </div>
            </div>

            <div id="form-registro" style="display: none;">
                <span class="login-logo">Crea tu cuenta</span>
                <p>Comienza tu camino hacia el bienestar</p>

                <form id="registerForm">
                    <div class="input-group">
                        <label for="reg-nombre">Nombre completo</label>
                        <input type="text" id="reg-nombre" required placeholder="Ej. Carlos Munguía">
                    </div>
                    <div class="input-group">
                        <label for="reg-email">Correo electrónico</label>
                        <input type="email" id="reg-email" required placeholder="tu@correo.com">
                    </div>
                    <div class="input-group">
                        <label for="reg-password">Contraseña</label>
                        <input type="password" id="reg-password" required placeholder="Mínimo 6 caracteres">
                    </div>
                    <button type="submit" class="btn-submit">Crear cuenta</button>
                </form>

                <div class="toggle-form">
                    ¿Ya tienes una cuenta? <a onclick="window.toggleForms()" style="cursor: pointer; color: var(--color-primario); font-weight: 600;">Inicia sesión</a>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        // Importamos sendEmailVerification y updateProfile
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // TUS LLAVES REALES DE FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyArxvBjK5d9PzmOEbuuRyVVu9MuhtKmd_Q",
            authDomain: "desemvolvatec.firebaseapp.com",
            projectId: "desemvolvatec",
            storageBucket: "desemvolvatec.firebasestorage.app",
            messagingSenderId: "559151091877",
            appId: "1:559151091877:web:ce2c950ab284c8cc5a3d4c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // --- LÓGICA VISUAL (Cambiar entre Login y Registro) ---
        window.toggleForms = function() {
            const loginForm = document.getElementById('form-login');
            const regForm = document.getElementById('form-registro');
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                regForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                regForm.style.display = 'block';
            }
        };

        // --- LÓGICA DE BASE DE DATOS: REGISTRO CON VERIFICACIÓN ---
        const registerForm = document.getElementById('registerForm');
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que la página recargue
            
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const nombre = document.getElementById('reg-nombre').value;

            try {
                // 1. Firebase crea la cuenta encriptada
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                
                // 2. Guardamos el nombre del usuario
                await updateProfile(userCredential.user, {
                    displayName: nombre
                });

                // 3. Enviamos el correo de verificación real
                await sendEmailVerification(userCredential.user);

                // 4. Le avisamos al usuario y limpiamos el formulario
                alert(`¡Cuenta creada con éxito, ${nombre}!\n\nHemos enviado un enlace de verificación a ${email}.\n\nPor favor, revisa tu bandeja de entrada (o la carpeta de SPAM) y haz clic en el enlace antes de iniciar sesión.`);
                
                // Forzamos el cierre de sesión para que no pueda entrar sin verificar
                await auth.signOut();

                registerForm.reset();
                window.toggleForms(); // Lo regresamos a la vista de Iniciar Sesión
                
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    alert("Ese correo electrónico ya está registrado.");
                } else if (error.code === 'auth/weak-password') {
                    alert("La contraseña debe tener al menos 6 caracteres.");
                } else {
                    alert("Error al registrar: " + error.message);
                }
            }
        });

        // --- LÓGICA DE BASE DE DATOS: INICIO DE SESIÓN PROTEGIDO ---
        const loginFormElement = document.getElementById('loginForm');
        loginFormElement.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                // Firebase valida las credenciales
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                
                // VERIFICACIÓN DEL CORREO
                if (userCredential.user.emailVerified) {
                    // Si ya hizo clic en el enlace de su correo, lo dejamos pasar
                    window.location.href = "dashboard.html";
                } else {
                    // Si no ha verificado, lo expulsamos inmediatamente
                    await auth.signOut();
                    alert("Aún no has verificado tu correo electrónico.\n\nPor favor, revisa tu bandeja de entrada y haz clic en el enlace que te enviamos para poder acceder a tu panel.");
                }
                
            } catch (error) {
                alert("Error al iniciar sesión. Verifica que tu correo y contraseña sean correctos.");
            }
        });
    </script>
</body>
</html>
